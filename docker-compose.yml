version: "3.9"

services:

  redis:
    image: redis:alpine
    container_name: redis_freddybot
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/freddybot/data
    networks:
      - app-network

  postgres:
    image: postgres:17
    container_name: postgres_freddybot
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: freddybot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/freddybot/data


networks:
  app-network:
    driver: bridge

volumes:
  redis-data:
  postgres_data:
